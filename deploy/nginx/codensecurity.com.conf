server {
    listen 80;
    listen [::]:80;
    server_name codensecurity.com www.codensecurity.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name codensecurity.com www.codensecurity.com;

    ssl_certificate /etc/letsencrypt/live/codensecurity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codensecurity.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /var/www/codensecurity/dist;
    index index.html;

    location = /privacy-policy.html {
        try_files $uri =404;
    }

    location = /terms.html {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
